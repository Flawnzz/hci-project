<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicVerse | Submission</title>
    <link rel="stylesheet" href="submission.css">
    <script defer src="submission.js"></script>
</head>
<body>
    <header>
        <div><strong>PicVerse</strong></div>
        <nav>
            <a href="home.html">Home</a>
            <a href="gallery.html">Gallery</a>
            <a href="submission.html">Submission</a>
            <a href="community.html">Community</a>
            <a href="about.html">About Us</a>
        </nav>
        <div></div>
    </header>
    
    <form id="submissionForm">
        <div class="container1">
            <div class="labell">
                <label class="label-word" for="email">Email</label>
                <label class="label-astk" for="*">*</label>
            </div>
            
            <input type="text" id="email" name="email" placeholder="...@gmail.com">
            <span id="error-email" class="error"></span>
        </div>

        <div class="container1">
            <div class="labell">
                <label class="label-word" for="title">Title</label>
                <label class="label-astk" for="*">*</label>
            </div>
            
            <input type="text" id="title" name="title" placeholder="Title">
            <span id="error-title" class="error"></span>
        </div>

        <div class="container1">
            <div class="labell">
                <label class="label-word" for="description">Description</label>
                <label class="label-astk" for="*">*</label>
            </div>
            
            <textarea name="text2" id="description" placeholder="Description"></textarea>
            <span id="error-description" class="error"></span>
        </div>

        <div class="container1">
            <div class="labell">
                <label class="label-word" for="tags">Tags</label>
                <label class="label-astk" for="*">*</label>
            </div>
            
            <input type="text" id="tags" name="tags" placeholder="#...">
            <span id="error-tags" class="error"></span>
        </div>

        <div class="container1">
            <div class="labell">
                <label class="label-word" for="upload-file">Upload File</label>
                <label class="label-astk" for="*">*</label>
            </div>
            
            <label class="custom-file-upload" for="upload-file">No file attached</label>
            <input type="file" id="upload-file" name="upload-file" placeholder="">
            <span id="error-upload-file" class="error"></span>
        </div>

        <div class="container1">
            <div class="labell">
                <label class="label-word" for="ai">Is the art AI generated?</label>
                <label class="label-astk" for="*">*</label>
            </div>
            
            <label class="radio-container">
                <input type="radio" name="choice" value="1" >
                <span class="checkmark"></span>
                Yes
            </label>

            <label class="radio-container">
                <input type="radio" name="choice" value="2" >
                <span class="checkmark"></span>
                No
            </label>
            <span id="error-radio" class="error"></span>
        </div>

        <button type="submit" class="btn-submit">Submit</button>
    </form>
    <div class="done-overlay" id="doneOverlay">
        <div class="black"></div>
        </div>
        <div class="overlay">           
            <h1>Submission Successful!</h1>
                <div class="overlay-buttons">
                <a href="submission.html">Go To Submission</a>
                <a href="home.html">Go To Home</a>
            </div>
        </div>
    </div> 

    <footer>
        <p>Follow Us</p>
        <div class="footer-info">
            <div class="footer-item">
                <img src="asset/insta.png" alt="Instagram" class="footer-icon">
            </div>
            <div class="footer-item">
                <img src="asset/x.png" alt="X" class="footer-icon">
            </div>
            <div class="footer-item">
                <img src="asset/facebook.png" alt="Facebook" class="footer-icon">
            </div>
            <div class="footer-item">
                <img src="asset/youtube.png" alt="Youtube" class="footer-icon">
            </div>
        </div>
        <p>Copyrights © 2025 PicVerse</p>
    </footer>
</body>
</html>
