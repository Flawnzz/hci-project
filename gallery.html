<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

<body>
    <header>
        <div><strong>PicVerse</strong></div>
        <nav>
            <a href="index.html">Home</a>
            <a href="gallery.html">Gallery</a>
            <a href="submission.html">Submission</a>
            <a href="community.html">Community</a>

        <a href="#modern-section">Modern</a>

    <!-- Renaissance -->
    <section id="renaissance-section" class="renaissance">
        <h2 class="category-title">Renaissance</h2>
        <div class="artwork">
            <div class="artwork-row">
                <div class="artwork-column1">
                    <div class="art">
                        <img class="img1" src="asset/The cannon shot Variant2.png" alt="The Cannon Shot">
                        <img class="img2-clickable" src="asset/The Cannon Shot.jpg" alt="The Cannon Shot" onclick=openPopup()>
                    </div>
                </div>

                <div class="artwork-column2">
                    <div class="art">
                        <img class="img1" src="asset/Flowers in a Metal Vase Variant2.png" alt="Flowers in a Metal Vase">
                        <img class="img2" src="asset/Flowers in a Metal Vase.jpg" alt="Flowers in a Metal Vase">
                    </div>
                </div>

                <div class="artwork-column3">
                    <div class="art">
                        <img class="img1" src="asset/The School of Athens Variant2.png" alt="The School of Athens">
                        <img class="img2" src="asset/The School of Athens.jpg" alt="The School of Athens">
                    </div>
                </div>

                <div class="filler">
                    <img src="asset/D1EBDB.png" alt="D1EBDB">
                </div>
                <div class="artwork-column1">
                    <div class="art">
                        <img class="img1" src="asset/The Creation of Adam Variant2.png" alt="The Creation of Adam">
                        <img class="img2" src="asset/Creation of Adam.jpg" alt="The Creation of Adam">
                    </div>
                </div>

                <div class="artwork-column2">
                    <div class="art">
                        <img class="img1" src="asset/Lamentations (The Mourning of Christ) Variant2.png" alt="Lamentation (Mourning of Christ)">
                        <img class="img2" src="asset/Lamentation (Mourning of Christ).jpg" alt="Lamentation (Mourning of Christ)">
                    </div>
                </div>

                </div>
            </div>

        </div>
    </section>
    <div id="popup" class="popup">
        <div class="popup-content">
            <img class="img3" src="asset/the cannon shot Variant3.png" alt="The Cannon Shot" onclick=closePopup()>
        </div>
    </div>
    

    <!-- Modern -->
    <section id="modern-section" class="modern">
        <h2 class="category-title">Modern</h2>
        <div class="artwork">

                </div>

                <div class="artwork-column2">

                <div class="artwork-column3">
                    <div class="art">

                        <img class="img2" src="asset/Road with Cypress and Star.jpg" alt="Road with Cypress and Star">
                    </div>
                </div>

                <div class="filler">
                    <img src="asset/D0D5CE.png" alt="D0D5CE">
                </div>
                <div class="artwork-column1">
                    <div class="art">

                <div class="artwork-column3">
                    <div class="art">
                        <img class="img1" src="asset/De Wandeling (The Walk) Variant2.png" alt="De Wandeling (The Walk)">
